name: Production Canary

# Loads the live site every 15 minutes in headless Chromium and checks it's actually
# serving the current build — not a blank shell, a stale cached deploy, or a broken
# page. On failure, screenshots the page and files (or comments on) a GitHub issue
# labelled "canary" so repeated failures don't spam a fresh issue every 15 minutes.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: production-canary
  cancel-in-progress: true

jobs:
  canary:
    # Scheduled/dispatched runs on a fork would hit gibsonstats.com under someone else's
    # repo and could file issues there with no owner watching — only run on the real repo.
    if: github.repository == 'jfisher43769/Gibson'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run canary check
        run: node scripts/canary.mjs

      - name: Upload failure screenshot + detail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canary-failure-${{ github.run_id }}
          path: |
            canary-failure.png
            canary-failure.txt
          if-no-files-found: warn
          retention-days: 14

      - name: File or update canary issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            let detail = "No failure detail file was written.";
            try { detail = fs.readFileSync("canary-failure.txt", "utf8").trim(); } catch {}

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "### Production canary failed",
              "",
              "```",
              detail,
              "```",
              "",
              `Workflow run (screenshot in artifacts): ${runUrl}`,
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "canary",
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Production canary failing: gibsonstats.com",
                body,
                labels: ["canary"],
              });
            }
